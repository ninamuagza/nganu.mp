name: Multi Platform Server Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  server:
    name: server-linux (x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake curl build-essential

      - name: Fetch Lua source
        run: |
          rm -rf /tmp/lua-5.5.0 /tmp/lua-5.5.0.tar.gz nganu.mp/vendor/lua-linux
          curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz -o /tmp/lua-5.5.0.tar.gz
          tar -xzf /tmp/lua-5.5.0.tar.gz -C /tmp

      - name: Build Lua static library for Linux
        working-directory: /tmp/lua-5.5.0/src
        run: |
          make clean || true
          make -j"$(nproc)" liblua.a MYCFLAGS="-fPIC"

          mkdir -p "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/include" "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/lib"
          cp ./*.h "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/include/"
          cp ./liblua.a "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/lib/"

      - name: Configure and build server
        working-directory: nganu.mp
        run: |
          cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release \
            -DNGANU_LUA_INCLUDE_DIR="$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/include" \
            -DNGANU_LUA_LIBRARY="$GITHUB_WORKSPACE/nganu.mp/vendor/lua-linux/lib/liblua.a"
          cmake --build build-ci --parallel

      - name: Server smoke test
        working-directory: nganu.mp
        run: ./bin/game-server --test

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: nganu-server-linux-x86_64
          path: nganu.mp/bin/game-server
          if-no-files-found: error

  server_android:
    name: server-android (arm64-v8a)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
      ANDROID_CMAKE_VERSION: 3.22.1
      ANDROID_API_LEVEL: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Fetch Lua source
        run: |
          rm -rf /tmp/lua-5.5.0 /tmp/lua-5.5.0.tar.gz nganu.mp/vendor/lua-android
          curl -L https://www.lua.org/ftp/lua-5.5.0.tar.gz -o /tmp/lua-5.5.0.tar.gz
          tar -xzf /tmp/lua-5.5.0.tar.gz -C /tmp

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}" "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Show Android toolchain info
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          ls "$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin"

      - name: Build Lua static library for Android arm64
        working-directory: /tmp/lua-5.5.0/src
        run: |
          export NDK="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export API="${ANDROID_API_LEVEL}"
          export SYSROOT="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"

          make clean || true

          make -j"$(nproc)" liblua.a \
            AR="${TOOLCHAIN}/llvm-ar rcu" \
            RANLIB="${TOOLCHAIN}/llvm-ranlib" \
            CC="${TOOLCHAIN}/clang --target=aarch64-linux-android${API} --sysroot=${SYSROOT}" \
            MYCFLAGS="-fPIC"

          mkdir -p "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/include" "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/lib"
          cp ./*.h "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/include/"
          cp ./liblua.a "$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/lib/"

      - name: Verify Lua outputs
        run: |
          ls -la nganu.mp/vendor/lua-android/include
          ls -la nganu.mp/vendor/lua-android/lib
          test -f nganu.mp/vendor/lua-android/lib/liblua.a
          file nganu.mp/vendor/lua-android/lib/liblua.a || true

      - name: Configure Android build
        working-directory: nganu.mp
        run: |
          ANDROID_CMAKE="$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin/cmake"
          "$ANDROID_CMAKE" -S . -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${ANDROID_API_LEVEL} \
            -DNGANU_LUA_INCLUDE_DIR="$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/include" \
            -DNGANU_LUA_LIBRARY="$GITHUB_WORKSPACE/nganu.mp/vendor/lua-android/lib/liblua.a"

      - name: Build Android server
        working-directory: nganu.mp
        run: |
          ANDROID_CMAKE="$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin/cmake"
          "$ANDROID_CMAKE" --build build-android --parallel

      - name: Show build outputs
        run: |
          find nganu.mp/build-android -maxdepth 5 \( -name "game-server" -o -name "*.so" -o -name "*.a" \) -print || true
          find nganu.mp/bin -maxdepth 2 -type f -print || true
          file nganu.mp/bin/game-server || true

      - name: Upload Android server artifact
        uses: actions/upload-artifact@v4
        with:
          name: nganu-server-android-arm64-v8a
          path: |
            nganu.mp/bin/game-server
            nganu.mp/build-android/**/game-server
            nganu.mp/build-android/**/*.so
            nganu.mp/build-android/**/*.a
          if-no-files-found: warn
