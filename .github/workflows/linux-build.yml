name: Multi Platform Server Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  server:
    name: server-linux (x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libluajit-5.1-dev

      - name: Configure and build server
        working-directory: nganu.mp
        run: |
          cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release
          cmake --build build-ci --parallel

      - name: Server smoke test
        working-directory: nganu.mp
        run: ./bin/game-server --test

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: nganu-server-linux-x86_64
          path: nganu.mp/bin/game-server
          if-no-files-found: error

  server_android:
    name: server-android (arm64-v8a)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_NDK_VERSION: 27.3.13750724
      ANDROID_CMAKE_VERSION: 3.22.1
      ANDROID_API_LEVEL: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Fetch LuaJIT source
        run: |
          rm -rf nganu.mp/vendor/LuaJIT
          git clone --depth=1 https://github.com/LuaJIT/LuaJIT.git nganu.mp/vendor/LuaJIT

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}" "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Show Android toolchain info
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          ls "$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin"

      - name: Build LuaJIT for Android arm64
        working-directory: nganu.mp/vendor/LuaJIT/src
        run: |
          export NDK="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export API="${ANDROID_API_LEVEL}"

          make clean || true

          make -j"$(nproc)" \
            HOST_CC="cc" \
            CROSS="" \
            STATIC_CC="${TOOLCHAIN}/clang --target=aarch64-linux-android${API}" \
            DYNAMIC_CC="true" \
            TARGET_AR="${TOOLCHAIN}/llvm-ar rcus" \
            TARGET_STRIP="${TOOLCHAIN}/llvm-strip" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="--sysroot=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot" \
            TARGET_CFLAGS="--target=aarch64-linux-android${API} -fPIC" \
            TARGET_LDFLAGS="--target=aarch64-linux-android${API}"

      - name: Verify LuaJIT outputs
        run: |
          ls -la nganu.mp/vendor/LuaJIT/src
          test -f nganu.mp/vendor/LuaJIT/src/libluajit.a

      - name: Configure Android build
        working-directory: nganu.mp
        run: |
          ANDROID_CMAKE="$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin/cmake"
          "$ANDROID_CMAKE" -S . -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${ANDROID_API_LEVEL}

      - name: Build Android server
        working-directory: nganu.mp
        run: |
          ANDROID_CMAKE="$ANDROID_SDK_ROOT/cmake/${ANDROID_CMAKE_VERSION}/bin/cmake"
          "$ANDROID_CMAKE" --build build-android --parallel

      - name: Show build outputs
        run: |
          find nganu.mp/build-android -maxdepth 5 \( -name "game-server" -o -name "*.so" -o -name "*.a" \) -print || true
          find nganu.mp/bin -maxdepth 2 -type f -print || true
          file nganu.mp/bin/game-server || true

      - name: Upload Android server artifact
        uses: actions/upload-artifact@v4
        with:
          name: nganu-server-android-arm64-v8a
          path: |
            nganu.mp/bin/game-server
            nganu.mp/build-android/**/game-server
            nganu.mp/build-android/**/*.so
            nganu.mp/build-android/**/*.a
          if-no-files-found: warn